# cargo-deny configuration for logdive workspace.
#
# Run:  cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = false
no-default-features = false

# ---------------------------------------------------------------------------
# Advisories — fail on vulnerabilities and unsound code
# ---------------------------------------------------------------------------
[advisories]
version = 2
# Known-safe ignores go here as { id = "RUSTSEC-XXXX-XXXX", reason = "..." }
ignore = []

# ---------------------------------------------------------------------------
# Licenses — allowlist only; deny everything else
# ---------------------------------------------------------------------------
[licenses]
version = 2
# All licenses present in the transitive dependency tree as of v0.2.1.
# Add new entries here when `cargo deny check` reports an unlisted license
# after a dependency upgrade.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "MIT-0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    "BSL-1.0",
]
# Confidence threshold for license-file scanning (0.0–1.0).
confidence-threshold = 0.8

# ---------------------------------------------------------------------------
# Bans — flag duplicate crate versions and disallowed crates
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "deny"
allow = []
deny = []
# Skip version checks for crates that intentionally ship two versions
# (common for proc-macro / runtime version splits).
#
# The entries below are transitive from `notify 6.1 → inotify 0.9`. notify 6
# is the current stable release; the 9.0 series (which updates these deps) is
# still pre-release. These duplicates are harmless — they appear only on the
# CLI side and are never exposed in the public API.
skip = [
    # inotify 0.9 (via notify 6.1) still uses bitflags 1.x
    { name = "bitflags", version = "1" },
    # notify 6.1 uses mio 0.8; tokio uses mio 1.x
    { name = "mio", version = "0.8" },
    # mio 0.8 uses windows-sys 0.48; everything else has moved to 0.61+
    { name = "windows-sys", version = "0.48" },
]
skip-tree = []

# ---------------------------------------------------------------------------
# Sources — only allow crates.io; deny unknown registries and git sources
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
